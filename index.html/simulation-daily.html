<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小澤ゼミシミュレーション</title>

  <!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シミュレーション</title>

  <style>
    body {
      margin: 0;
      background: #444;
      color: white;
      font-family: sans-serif;
      height: 100vh;
    }

    /* 背景 */
    .game-screen {
      width: 100%;
      height: 100vh;
      position: relative;
      background-color: #666;
    }

    /* セリフ欄 */
    .textbox {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.85);
      padding: 25px;
      box-sizing: border-box;
      cursor: pointer;
    }

    /* 話者 */
    #speaker {
      color: gold;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    /* セリフ */
    #text {
      font-size: 22px;
      line-height: 1.8;
    }

    /* タップ表示 */
    .tap {
      text-align: right;
      margin-top: 10px;
      color: lightgray;
    }
  </style>
</head>
<body>

<div class="game-screen">

  <div class="textbox" onclick="nextText()">

    <div id="speaker"></div>

    <div id="text"></div>

    <div class="tap">
      ▼クリック
    </div>

  </div>

</div>

<script>

const story = [

  {
    speaker: "主人公",
    text: "セリフ１"
  },

  {
    speaker: "ナレーション",
    text: "セリフ２"
  },

  {
    speaker: "先生",
    text: "セリフ３"
  }

];

let current = 0;

function showText() {
  document.getElementById("speaker").textContent =
    story[current].speaker;

  document.getElementById("text").textContent =
    story[current].text;
}

function nextText() {
  current++;

  if(current < story.length) {
    showText();
  }
}

showText();

</script>

</body>
</html>
