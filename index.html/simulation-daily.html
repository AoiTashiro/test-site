button {

let currentScene = "start";

function showScene() {

  const scene = scenes[currentScene];

  document.getElementById("speaker").textContent =
    scene.speaker;

  document.getElementById("text").textContent =
    scene.text;

  const oldChoices =
    document.getElementById("choices");

  if(oldChoices){
    oldChoices.remove();
  }

  if(scene.choices){

    const choiceBox =
      document.createElement("div");

    choiceBox.id = "choices";

    scene.choices.forEach(choice => {

      const button =
        document.createElement("button");

      button.textContent =
        choice.text;

      button.onclick = function(event){

        event.stopPropagation();

        currentScene =
          choice.next;

        showScene();
      };

      choiceBox.appendChild(button);
    });

    document.querySelector(".textbox")
      .appendChild(choiceBox);
  }
}

function nextText() {

  const scene =
    scenes[currentScene];

  if(scene.choices){
    return;
  }

  if(scene.next){
    currentScene =
      scene.next;

    showScene();
  }
}
