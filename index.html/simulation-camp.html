<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小澤ゼミシミュレーション【合宿編】</title>

  <style>
    body {
      margin: 0;
      background-color: #444;
      color: white;
      font-family: sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    /* 背景 */
    .game-screen {
      width: 100%;
      height: 100vh;
      position: relative;
      background-color: #666;
      background-size: cover;
      background-position: center;
    }

    /* セリフ欄 */
    .textbox {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.85);
      padding: 30px;
      box-sizing: border-box;
      cursor: pointer;
    }

    /* 名前 */
    #speaker {
      color: gold;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    /* セリフ */
    #text {
      font-size: 24px;
      line-height: 1.8;
    }

    /* タップ表示 */
    .tap {
      text-align: right;
      margin-top: 15px;
      color: lightgray;
    }

    /* 選択肢 */
    #choices {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="game-screen">

  <div class="textbox" onclick="nextText()">

    <div id="speaker"></div>

    <div id="text"></div>

    <div class="tap">
      ▼クリック
    </div>

  </div>

</div>

<script>

const scenes = {

  // A集合
  start: {
    speaker: "同期１",
    text: "おはよー！！結構みんな集まってきたね！",
    next: "a2"
  },

  a2: {
    speaker: "同期２",
    text: "まじで合宿楽しみだね！！部屋どんな感じなんだろ！",
    next: "a3"
  },

  a3: {
    speaker: "先輩",
    text: "出発までまだもう少し時間あるから、トイレとか済ませといてねー！",
    next: "aChoice"
  },

  // 選択肢
  aChoice: {
    speaker: "",
    text: "",
    choices: [
      {
        text: "① 友達とお昼ご飯を買いに行く",
        next: "lunch1"
      },

      {
        text: "② 10分前に到着して持ち物を確認しておく",
        next: "check1"
      }
    ]
  },

  // ① コンビニルート
  lunch1: {
    speaker: "同期",
    text: "コンビニ寄ろ！絶対途中でおなかすいちゃうわ！！",
    next: "lunch2"
  },

  lunch2: {
    speaker: "あなた",
    text: "行こ！！お菓子買いたい！",
    next: "bPart"
  },

  // ② 準備ルート
  check1: {
    speaker: "あなた",
    text: "早めに着けてよかった～・・・",
    next: "check2"
  },

  check2: {
    speaker: "同期",
    text: "もう準備終わってるの！はやっ！！",
    next: "bPart"
  },

 bPart: {
  speaker: "ナレーション",
  text: "バスが出発した。周りから楽しそうな笑い声が聞こえる。",
  next: "b2"
},

b2: {
  speaker: "同期",
  text: "こっち席空いてるよ！",
  next: "bChoice"
},

// 選択肢
bChoice: {
  speaker: "",
  text: "",
  choices: [
    {
      text: "① 何時に着くのか合宿スケジュールを確認しておく",
      next: "schedule1"
    },

    {
      text: "② 周りの人と雑談して盛り上がる",
      next: "chat1"
    }
  ]
},

// ① スケジュール確認ルート
schedule1: {
  speaker: "あなた",
  text: "13時ごろに着くのか、今日も長いし少し寝とこうかな",
  next: "schedule2"
},

schedule2: {
  speaker: "同期",
  text: "今日も結構詰まってるんだね！私も少し寝とこうかな！",
  next: "schedule3"
},

schedule3: {
  speaker: "ナレーション",
  text: "宿に到着し、ディスカッションが始まる。ディスカッションを終え----",
  next: "cPart"
},

// ② 雑談ルート（仮）
chat1: {
  speaker: "同期",
  text: "みんなで話してたらあっという間だね！！",
  next: "chat2"
},

chat2: {
  speaker: "ナレーション",
  text: "宿に到着し、ディスカッションが始まる。ディスカッションを終え----",
  next: "cPart"
},

// Cパート（仮）
cPart: {
  speaker: "ナレーション",
  text: "【Cパートへ】"
},

};

let currentScene = "start";

function showScene() {

  const scene = scenes[currentScene];

  document.getElementById("speaker").textContent =
    scene.speaker;

  document.getElementById("text").textContent =
    scene.text;

  const oldChoices =
    document.getElementById("choices");

  if(oldChoices){
    oldChoices.remove();
  }

  if(scene.choices){

    const choiceBox =
      document.createElement("div");

    choiceBox.id = "choices";

    scene.choices.forEach(choice => {

      const button =
        document.createElement("button");

      button.textContent =
        choice.text;

      button.onclick = function(event){

        event.stopPropagation();

        currentScene =
          choice.next;

        showScene();
      };

      choiceBox.appendChild(button);
    });

    document.querySelector(".textbox")
      .appendChild(choiceBox);
  }
}

function nextText() {

  const scene =
    scenes[currentScene];

  if(scene.choices){
    return;
  }

  if(scene.next){
    currentScene =
      scene.next;

    showScene();
  }
}

showScene();

</script>

</body>
</html>
